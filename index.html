<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Apply the theme before first paint to avoid a flash (FOUC). Uses the
         pinned theme, or the system preference when none is stored. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          var el = document.documentElement
          el.style.colorScheme = t
          el.classList.toggle('light', t === 'light')
        } catch (e) {}
      })()
    </script>
    <meta
      name="description"
      content="IA-dex — el índice de software de inteligencia artificial, catalogado por temas."
    />

    <!-- Brand type: Inter (body) · Space Grotesk (display) · JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    />

    <title>IA-dex · Índice de software de IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
